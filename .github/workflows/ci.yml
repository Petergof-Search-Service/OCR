name: Test and Deploy OCR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  # Каталог YC, от имени которого тарифицируется Vision OCR API (x-folder-id).
  # Сейчас одинаков для обоих окружений.
  OCR_API_FOLDER_ID: "b1g0gm5epaeepgfov6ni"
  RUNTIME: "python314"
  MEMORY: "2GB"
  EXECUTION_TIMEOUT: "3600s"
  CONCURRENCY: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install ruff
        run: pip install ruff==0.9.2

      - name: Ruff
        run: ruff check src

  # Pull request -> deploy to the TESTING cloud/folder.
  deploy-test:
    name: Deploy (test)
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Deploy ocr-processing version
        env:
          YC_SA_JSON: ${{ secrets.YC_SA_JSON_CREDENTIALS_TEST }}
          FOLDER_ID: ${{ secrets.YC_FOLDER_ID_TEST }}
          SA_ID: "ajeccs8j8b7igcjacd0r"
          NETWORK_ID: "enp9p8putg0rnnnsa1c4"
          BUCKET: "petergof-testing-backet"
          OCR_API_KEY: ${{ secrets.YANDEX_API_KEY }}
          API_BASE_URL: ${{ vars.API_BASE_URL_TEST }}
          CLOUD_FUNCTION_API_KEY: ${{ secrets.CLOUD_FUNCTION_API_KEY }}
        run: bash .github/deploy.sh

  # Merge to main -> deploy to the PROD cloud/folder.
  deploy-prod:
    name: Deploy (prod)
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ocr-processing version
        env:
          YC_SA_JSON: ${{ secrets.YC_SA_JSON_CREDENTIALS_PROD }}
          FOLDER_ID: ${{ secrets.YC_FOLDER_ID_PROD }}
          SA_ID: "ajerbgv6jbhvacbev1id"
          NETWORK_ID: "enpk8tubalksvn0nkkus"
          BUCKET: "petergof-incoming-prod"
          OCR_API_KEY: ${{ secrets.YANDEX_API_KEY }}
          API_BASE_URL: ${{ vars.API_BASE_URL_PROD }}
          CLOUD_FUNCTION_API_KEY: ${{ secrets.CLOUD_FUNCTION_API_KEY }}
        run: bash .github/deploy.sh
